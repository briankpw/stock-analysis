# =============================================================================
# Key Stock — root docker-compose stack.
#
# This file is functionally equivalent to `deploy/portainer/stack.yml`
# but targeted at direct `docker compose up` from a dev machine or a plain
# Docker host (no Portainer). Both files share the same env var contract:
#
#   * DATA_MOUNT      — volume source (named volume OR absolute host path)
#   * DOCKER_NETWORK  — external network name (bridge / traefik_proxy / …)
#   * APP_TOKEN       — optional bearer-token auth for /api/*
#
# Copy `.env.example` -> `.env` at the repo root and edit the overrides
# there; Compose picks it up automatically.
#
# Hardening applied (see deploy/portainer/README.md for the full audit):
#   * init: true         -> tini as PID 1 for clean SIGTERM propagation
#   * read_only: true    -> only /app/data and /tmp are writable
#   * cap_drop: [ALL]    -> no Linux capabilities retained
#   * security_opt       -> no-new-privileges blocks setuid escalation
#   * resources.limits   -> memory ceilings per service
#   * logging            -> json-file with 10 MB × 3 rotation
# =============================================================================

x-build: &default_build
  context: .
  dockerfile: Dockerfile

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default_security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  ui:
    image: ${IMAGE:-key-stock:latest}
    build: *default_build
    container_name: ${STACK_NAME:-key-stock}-ui
    restart: unless-stopped
    # Run as PUID:PGID from the start. Combined with `cap_drop: [ALL]`
    # this means the entrypoint never touches chown() or setgroups() —
    # both of which require capabilities we've dropped. The host must
    # have chowned the bind-mounted /app/data to this uid:gid up front
    # (or leave the default named volume, which is created empty).
    user: "${PUID:-1000}:${PGID:-1000}"
    # `init: true` would add docker-init as PID 1 in addition to the
    # tini baked into ENTRYPOINT, producing a spurious "not running as
    # PID 1" warning from tini. Rely on the image's tini alone.
    init: false
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    <<: *default_security
    logging: *default_logging
    ports:
      # APP_PORT drives both sides — see stack.yml for the rationale.
      - "${APP_PORT:-5001}:${APP_PORT:-5001}"
    environment:
      NODE_ENV: production
      PORT: "${APP_PORT:-5001}"
      HOSTNAME: 0.0.0.0
      TZ: ${TZ:-UTC}
      # Runtime UID/GID — entrypoint chowns /app/data and su-exec's the
      # Node process. Set to the owner of DATA_MOUNT when using a bind
      # path; default 1000:1000 matches most Linux distros' first user.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      NODE_OPTIONS: "--max-old-space-size=384"

      APP_TOKEN: ${APP_TOKEN:-}

      STOCK_TICKER:     ${STOCK_TICKER:-KEYS}
      COMPANY_NAME:     ${COMPANY_NAME:-Keysight Technologies}
      DEFAULT_PERIOD:   ${DEFAULT_PERIOD:-1y}
      DEFAULT_INTERVAL: ${DEFAULT_INTERVAL:-1d}

      CACHE_TTL_SECONDS:           ${CACHE_TTL_SECONDS:-900}
      PORTFOLIO_CACHE_TTL_SECONDS: ${PORTFOLIO_CACHE_TTL_SECONDS:-21600}
      SEC_USER_AGENT:              ${SEC_USER_AGENT:-Key Stock Dashboard research@example.com}

      PAPER_STARTING_CASH: ${PAPER_STARTING_CASH:-100000}
      PAPER_COMMISSION:    ${PAPER_COMMISSION:-0}

      BOT_DB_PATH: /app/data/bot.db

      TELEGRAM_BOT_TOKEN:      ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-}
      TELEGRAM_CHAT_ID:        ${TELEGRAM_CHAT_ID:-}
    volumes:
      # DATA_MOUNT accepts either a Docker named volume name (default) or
      # an absolute host path for a bind mount. See .env.example for the
      # chown requirements when you switch to a bind path.
      - ${DATA_MOUNT:-key_stock_data}:/app/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:${APP_PORT:-5001}/api/health"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  worker:
    image: ${IMAGE:-key-stock:latest}
    container_name: ${STACK_NAME:-key-stock}-worker
    command: ["node", "dist/worker.js"]
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    init: false
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    <<: *default_security
    logging: *default_logging
    depends_on:
      ui:
        # Wait for UI's /api/health to be green before starting the worker.
        # UI runs the schema migrations; worker inherits a stable schema.
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      # Must match the UI's PUID/PGID — both processes share the SQLite file.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      NODE_OPTIONS: "--max-old-space-size=512"
      PORT: ""

      STOCK_TICKER:              ${STOCK_TICKER:-KEYS}
      SEC_USER_AGENT:            ${SEC_USER_AGENT:-Key Stock Dashboard research@example.com}
      BOT_LOOKBACK_PERIOD:       ${BOT_LOOKBACK_PERIOD:-1y}
      BOT_LOOKBACK_INTERVAL:     ${BOT_LOOKBACK_INTERVAL:-1d}
      BOT_POLL_INTERVAL_SECONDS: ${BOT_POLL_INTERVAL_SECONDS:-900}
      BOT_DB_PATH:               /app/data/bot.db

      TELEGRAM_BOT_TOKEN:      ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-}
      TELEGRAM_CHAT_ID:        ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ${DATA_MOUNT:-key_stock_data}:/app/data
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 192M

volumes:
  # Declaration for the DEFAULT case where DATA_MOUNT is a bare name
  # (i.e. a managed named volume). Compose ignores this declaration when
  # DATA_MOUNT is set to an absolute host path — a bind mount doesn't
  # need a top-level `volumes:` entry.
  key_stock_data:
    name: ${STACK_NAME:-key-stock}_data

networks:
  # `external: true` means Docker must already have this network before
  # the stack starts. `bridge` is Docker's built-in default and always
  # exists; for a reverse-proxy setup point DOCKER_NETWORK at your Traefik
  # / Caddy network (create it once with `docker network create <name>`).
  app_net:
    external: true
    name: ${DOCKER_NETWORK:-bridge}
