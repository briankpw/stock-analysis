# =============================================================================
# Key Stock — Portainer stack (Compose v3.x)
#
# Two supported deploy flows:
#
#   1) Portainer -> Stacks -> Add stack -> Repository
#      Repository URL : <this repo>
#      Compose path   : deploy/portainer/stack.yml
#      => Portainer builds the image from the repo root Dockerfile.
#         The `build:` block below (context: ../..) is what makes this work.
#
#   2) Portainer -> Stacks -> Add stack -> Web editor
#      Paste this file, then set env var `IMAGE` to a prebuilt image such as
#      `ghcr.io/<you>/key-stock:1.0.0`. When `image:` resolves to a valid
#      registry ref, Compose skips the build blocks.
#
# Persistent state (paper trading, watchlist, bot signals, portfolio presets,
# notifications history) lives in the `key_stock_data` named volume mounted
# at /app/data. Do NOT delete this volume unless you want to wipe everything.
#
# Hardening applied here (see deploy/portainer/README.md for the full audit
# writeup):
#   * init: true         -> tini is PID 1, so SIGTERM propagates to Node
#   * read_only: true    -> only /app/data and /tmp are writable
#   * cap_drop: [ALL]    -> no Linux capabilities retained
#   * security_opt       -> no-new-privileges blocks setuid escalation
#   * resources.limits   -> memory ceiling per service
#   * logging            -> json-file with rotation (10MB × 3 files)
# =============================================================================

# YAML anchor reused by both services — they build from the same context /
# Dockerfile, and share most env / hardening settings. Compose supports
# `<<: *anchor` for a shallow merge.
x-build: &default_build
  context: ../..
  dockerfile: Dockerfile

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default_security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  ui:
    image: ${IMAGE:-key-stock:latest}
    build: *default_build
    # Force-build every time instead of trying to pull. Without this,
    # Portainer's "Re-pull and redeploy" (and any `docker compose pull`)
    # attempts to fetch `key-stock:latest` from Docker Hub — which
    # doesn't exist and returns "access denied". `pull_policy: build`
    # makes Compose skip the pull step and rebuild from the Dockerfile.
    # Override IMAGE to a real registry ref (e.g. ghcr.io/…) if you
    # actually want to pull a prebuilt image; the policy is honoured
    # per-service so a build-mode image can't be pulled by accident.
    pull_policy: build
    container_name: ${STACK_NAME:-key-stock}-ui
    restart: unless-stopped
    # Run as PUID:PGID from the start. Combined with `cap_drop: [ALL]`
    # this means the entrypoint never touches chown() or setgroups() —
    # both of which require capabilities we've dropped. The host must
    # have chowned the bind-mounted /app/data to this uid:gid up front
    # (or leave the default named volume, which is created empty).
    user: "${PUID:-1000}:${PGID:-1000}"
    # `init: true` would add docker-init as PID 1 in addition to the
    # tini baked into ENTRYPOINT, producing a spurious "not running as
    # PID 1" warning from tini. Rely on the image's tini alone.
    init: false
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    <<: *default_security
    logging: *default_logging
    ports:
      # APP_PORT drives BOTH sides — the container listener (via the PORT
      # env below) AND the host-side mapping. Same value on each side keeps
      # in-cluster links and reverse-proxy configs identical to what you'd
      # hit from the host.
      - "${APP_PORT:-5001}:${APP_PORT:-5001}"
    environment:
      NODE_ENV: production
      PORT: "${APP_PORT:-5001}"
      HOSTNAME: 0.0.0.0
      TZ: ${TZ:-UTC}
      # ── Runtime UID / GID (LinuxServer.io convention) ──────────────
      # The entrypoint chowns /app/data to this pair and su-exec's the
      # Node process as it. Set these to the OWNER of your DATA_MOUNT
      # host path (e.g. `id -u` / `id -g` on the host user that will
      # own the bind-mounted directory). Default 1000:1000 matches the
      # first regular user on most Linux distros.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # Cap the V8 old-space so a bad JSON.parse can't OOM the host. Sized
      # ~75% of the memory limit below to leave room for native buffers.
      NODE_OPTIONS: "--max-old-space-size=384"

      # ---- Public URL ------------------------------------------------------
      # Absolute URL the UI is served from, e.g. `https://stocks.example.com`.
      # Optional — when set, the CSRF middleware trusts it as an origin
      # baseline (important when a reverse proxy rewrites the Host header).
      # Leave blank for local / same-host deployments.
      APP_URL: ${APP_URL:-}

      # ---- Optional bearer-token auth --------------------------------------
      # When set, every /api/* call (except /api/health) must present
      # Authorization: Bearer <APP_TOKEN> or an app_token cookie. Leave
      # empty for a fully-open local install. Prefer a long random string
      # (e.g. `openssl rand -hex 32`) when exposing to the internet.
      APP_TOKEN: ${APP_TOKEN:-}

      # ---- Ticker / defaults -----------------------------------------------
      STOCK_TICKER:     ${STOCK_TICKER:-KEYS}
      COMPANY_NAME:     ${COMPANY_NAME:-Keysight Technologies}
      DEFAULT_PERIOD:   ${DEFAULT_PERIOD:-1y}
      DEFAULT_INTERVAL: ${DEFAULT_INTERVAL:-1d}

      # ---- Caching ---------------------------------------------------------
      CACHE_TTL_SECONDS:           ${CACHE_TTL_SECONDS:-900}
      PORTFOLIO_CACHE_TTL_SECONDS: ${PORTFOLIO_CACHE_TTL_SECONDS:-21600}
      SEC_USER_AGENT:              ${SEC_USER_AGENT:-Key Stock Dashboard research@example.com}

      # ---- Paper trading ---------------------------------------------------
      PAPER_STARTING_CASH: ${PAPER_STARTING_CASH:-100000}
      PAPER_COMMISSION:    ${PAPER_COMMISSION:-0}

      # ---- Bot / persistence ----------------------------------------------
      BOT_DB_PATH: /app/data/bot.db

      # ---- Telegram (optional) --------------------------------------------
      # Prefer TELEGRAM_BOT_TOKEN_FILE when the value is sensitive — that
      # points at a Docker secret mount and never leaks into `docker inspect`.
      TELEGRAM_BOT_TOKEN:      ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-}
      TELEGRAM_CHAT_ID:        ${TELEGRAM_CHAT_ID:-}
    volumes:
      # ── Data mount ────────────────────────────────────────────────────
      # DATA_MOUNT accepts either a Docker named volume name (default) or
      # an absolute host path for a bind mount:
      #   DATA_MOUNT=key_stock_data          — managed named volume (default)
      #   DATA_MOUNT=/opt/keystock/data      — bind to a host directory
      # See deploy/portainer/README.md for the chown requirements when you
      # switch to a bind path.
      - ${DATA_MOUNT:-key_stock_data}:/app/data
    networks:
      - app_net
    healthcheck:
      # Compose expands ${APP_PORT} at config-resolution time so the
      # container-side wget still hits the right port when APP_PORT is
      # overridden.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:${APP_PORT:-5001}/api/health"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  worker:
    image: ${IMAGE:-key-stock:latest}
    # Same image as `ui` (already built above). Give worker its own
    # build block + `pull_policy: build` so Portainer's re-pull step
    # doesn't try to fetch `key-stock:latest` from Docker Hub for this
    # service either. The second build is a cache hit — the layers are
    # already present from ui's build.
    build: *default_build
    pull_policy: build
    container_name: ${STACK_NAME:-key-stock}-worker
    command: ["node", "dist/worker.js"]
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    init: false
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    <<: *default_security
    logging: *default_logging
    depends_on:
      ui:
        # Wait for UI's /api/health to be green before starting the worker.
        # This makes UI the schema-owner: the migrations in lib/db.ts run
        # once, and the worker inherits a stable schema on first tick.
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      # Must match the UI's PUID/PGID so both processes can read/write
      # the shared SQLite file. See ui.environment for the full comment.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # Worker parses PDFs and holds bar arrays in memory, so it gets a bit
      # more headroom than the UI.
      NODE_OPTIONS: "--max-old-space-size=512"
      # Worker doesn't listen on any port — this just documents intent for
      # `docker inspect` readers.
      PORT: ""

      STOCK_TICKER:              ${STOCK_TICKER:-KEYS}
      SEC_USER_AGENT:            ${SEC_USER_AGENT:-Key Stock Dashboard research@example.com}
      BOT_LOOKBACK_PERIOD:       ${BOT_LOOKBACK_PERIOD:-1y}
      BOT_LOOKBACK_INTERVAL:     ${BOT_LOOKBACK_INTERVAL:-1d}
      BOT_POLL_INTERVAL_SECONDS: ${BOT_POLL_INTERVAL_SECONDS:-900}
      BOT_DB_PATH:               /app/data/bot.db

      TELEGRAM_BOT_TOKEN:      ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN_FILE: ${TELEGRAM_BOT_TOKEN_FILE:-}
      TELEGRAM_CHAT_ID:        ${TELEGRAM_CHAT_ID:-}
    volumes:
      # Must match the UI's DATA_MOUNT — both services share the same
      # SQLite file on this path.
      - ${DATA_MOUNT:-key_stock_data}:/app/data
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 192M

volumes:
  # Declaration for the DEFAULT case where DATA_MOUNT is a bare name
  # (i.e. a managed named volume). Compose ignores this declaration when
  # DATA_MOUNT is set to an absolute host path — a bind mount doesn't
  # need a top-level `volumes:` entry.
  key_stock_data:
    name: ${STACK_NAME:-key-stock}_data

networks:
  # ── External network attachment ──────────────────────────────────────
  # `external: true` means Docker must already have this network before
  # the stack starts — Compose will not create it. This is deliberate:
  #
  #   * DOCKER_NETWORK=bridge (default) attaches both services to Docker's
  #     built-in `bridge` network. Note that the default bridge does NOT
  #     provide DNS by service name — that's fine here because the UI and
  #     worker only communicate through the shared SQLite file, not HTTP.
  #
  #   * DOCKER_NETWORK=traefik_proxy (or your reverse-proxy net) attaches
  #     to a pre-existing user-defined bridge / overlay so a reverse proxy
  #     already on that network can route to the `ui` container by name.
  #
  # Create the network beforehand if it doesn't exist:
  #     docker network create <name>
  app_net:
    external: true
    name: ${DOCKER_NETWORK:-bridge}
